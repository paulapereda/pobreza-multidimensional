name: Deploy to portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to portfolio subfolder
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://x-access-token:${{ secrets.PORTFOLIO_TOKEN }}@github.com/paulapereda/paulapereda-portfolio.git /tmp/portfolio
          rm -rf /tmp/portfolio/pobreza-multidimensional
          mkdir -p /tmp/portfolio/pobreza-multidimensional
          cp -r . /tmp/portfolio/pobreza-multidimensional/
          cd /tmp/portfolio
          git add .
          git commit -m "Update pobreza-multidimensional" || echo "Nothing to commit"
          git push
